services:
  - type: web
    name: paperclip-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: AUTH_MODE
        value: authenticated
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: API_KEY
        generateValue: true
    domains:
      - paperclip-server.onrender.com

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: starter
    region: oregon